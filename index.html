<!DOCTYPE html>
<html>
<head>

<title>Solar Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#e5e5e5;
    font-family:Arial, sans-serif;
}


/* Mobile App Frame */

.app{
    width:390px;
    max-width:100%;
    min-height:100vh;
    margin:auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 5px 25px rgba(0,0,0,0.25);
}


/* Header */

.header{
    background:#ff9800;
    color:white;
    text-align:center;
    padding:25px;
}


.logo img{
    width:80px;
    height:80px;
    border-radius:20px;
}


.logo{
    font-size:60px;
}


.title{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}


.sub{
    font-size:14px;
}


/* Body */

.content{
    padding:20px;
}


label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}


input, select{

    width:100%;
    padding:12px;
    margin-top:7px;

    border:1px solid #ccc;
    border-radius:12px;

    font-size:16px;

}


button{

    width:100%;

    margin-top:25px;

    padding:14px;

    background:#ff9800;

    color:white;

    border:none;

    border-radius:15px;

    font-size:18px;

    font-weight:bold;

}


.result{

    margin-top:20px;

    padding:15px;

    background:#eef8ff;

    border-radius:15px;

    line-height:1.8;

}


</style>

</head>


<body>


<div class="app">


<div class="header">


<!-- Logo နေရာ -->

<div class="logo">

<img src="icon.png" 
onerror="this.style.display='none';">


</div>


<div class="title">
Amber Light Solar
</div>


<div class="sub">
PV Design Tool
</div>


</div>




<div class="content">


<label>
Roof Length (m)
</label>

<input id="length" type="number" placeholder="Example 20">



<label>
Roof Width (m)
</label>

<input id="width" type="number" placeholder="Example 10">



<label>
Panel Watt
</label>

<select id="watt">

<option value="615">615 W</option>
<option value="650">650 W</option>
<option value="700">700 W</option>
<option value="720">720 W</option>
<option value="750">750 W</option>

</select>




<label>
Roof Utilization (%)
</label>

<input id="util" type="number" value="80">



<button onclick="calculate()">
Calculate
</button>



<div class="result" id="result">

Result will appear here

</div>



</div>


</div>





<script>


function calculate(){


let length =
Number(document.getElementById("length").value);


let width =
Number(document.getElementById("width").value);


let watt =
Number(document.getElementById("watt").value);


let util =
Number(document.getElementById("util").value);



if(!length || !width){

alert("Enter Roof Size");

return;

}


// Roof

let roofArea = length * width;


// Usable

let usable =
roofArea * util /100;


// Panel Area

let panelArea =
2.384 * 1.303;


// Qty

let qty =
Math.floor(usable / panelArea);


// DC kW

let dc =
qty * watt /1000;


// Inverter

let inverter =
dc * 0.8;



document.getElementById("result").innerHTML =

`
<b>Roof Area :</b> ${roofArea.toFixed(2)} m²<br>

<b>Total Panel Qty :</b> ${qty} pcs<br>

<b>Total DC :</b> ${dc.toFixed(2)} kW<br>

<b>Recommended Inverter :</b> ${Math.ceil(inverter)} kW

`;

}


</script>


</body>
</html>
